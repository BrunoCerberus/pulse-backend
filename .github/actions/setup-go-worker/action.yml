name: Set up Go (rss-worker)
description: >
  Sets up the Go toolchain for the rss-worker module. Single source of truth for
  the pinned setup-go SHA, the Go version (resolved from rss-worker/go.mod via
  go-version-file so it can't drift from the module's `go` directive), and the
  module build cache. Requires the repository to already be checked out.

runs:
  using: composite
  steps:
    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        # Resolve the version from go.mod's `go` directive — one source of truth,
        # no inline "1.25" copies to drift (the gomod-sync check guards go.mod).
        go-version-file: rss-worker/go.mod
        cache: true
        cache-dependency-path: rss-worker/go.sum
