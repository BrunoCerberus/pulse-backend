name: Source Health Watchdog

# Polls the api-source-health endpoint on a schedule and fails the job when
# thresholds are exceeded. A failed workflow triggers GitHub's built-in email
# notifications to repo watchers — no external alerting service needed.
#
# Thresholds below are intentionally generous for the default fleet of ~133
# sources. Tighten them once the fleet stabilizes and we have a baseline.

on:
  schedule:
    # Every 6 hours at :15 past the hour (staggered from the 2h fetch cron).
    - cron: '15 */6 * * *'
  workflow_dispatch:

permissions:
  contents: read

# One health check at a time; a manual dispatch shouldn't double up with the
# 6-hourly cron.
concurrency:
  group: watchdog
  cancel-in-progress: false

jobs:
  watchdog:
    name: Check source health
    runs-on: ubuntu-latest
    timeout-minutes: 5

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      # Note: no SUPABASE_SERVICE_ROLE_KEY here. The Edge Function
      # api-source-health is now declared `verify_jwt = false` and uses
      # its own server-side service-role key to read the privileged
      # source_health view. Sending a JWT in this workflow was a leak
      # vector (function logs captured the bearer).
      # Thresholds — fail the job when any of these are exceeded.
      # Calibrated post-cleanup (migration 023 inactivated 16 dead sources).
      # Baseline floor on 2026-05-12 after cleanup: circuit_open=1, stale=23,
      # high_failure=0. Headroom of ~4-7 sources before alert fires:
      #   - stale at 23 → 27 catches widespread degradation, tolerates monthly
      #     podcasts that happen to be at the bottom of their cycle.
      #   - circuit_open at 1 → 8 absorbs transient network/DNS blips without
      #     false-paging, fires on real outages.
      MAX_CIRCUIT_OPEN: 8
      MAX_STALE: 27
      MAX_HIGH_FAILURE: 15
      # DB size as a % of quota. Free tier is 500 MB; the May 2026 cleanup
      # (search_vector + unused-index drops) brought us from 41% to 21%, so
      # this can tighten from 70% → 60% (~300 MB) for earlier warning while
      # still leaving ~200 MB of headroom before Supabase restricts the project
      # (which is what the April 2026 incident hit at 100%).
      MAX_DB_QUOTA_PCT: 60

    steps:
      - name: Query source health
        run: |
          set -euo pipefail

          # Hit the Edge Function — no auth header needed (verify_jwt = false).
          response=$(curl -fsS --max-time 30 \
            "${SUPABASE_URL}/functions/v1/api-source-health")

          echo "Summary:"
          echo "$response" | jq '.summary'
          echo "Database:"
          echo "$response" | jq '.database'

          circuit_open=$(echo "$response" | jq -r '.summary.circuit_open_count')
          stale=$(echo "$response" | jq -r '.summary.stale_count')
          high_failure=$(echo "$response" | jq -r '.summary.high_failure_count')
          # `// empty` keeps the var unset when the RPC failed (database == null)
          # so we don't false-alarm on transient size-check failures.
          db_quota_pct=$(echo "$response" | jq -r '.database.quota_pct // empty')

          # Validate everything is a non-negative integer before arithmetic.
          # Anything else is treated as missing (the `fail=0` default holds
          # unless we explicitly trip a threshold) so a broken upstream
          # never silently passes thresholds.
          int_re='^[0-9]+$'
          for v in circuit_open stale high_failure; do
            val=${!v}
            if ! [[ "$val" =~ $int_re ]]; then
              echo "::error title=Watchdog input::expected integer for $v, got '$val'"
              exit 1
            fi
          done

          fail=0
          if (( circuit_open > MAX_CIRCUIT_OPEN )); then
            echo "::error title=Circuit breaker::circuit_open_count=${circuit_open} exceeds threshold ${MAX_CIRCUIT_OPEN}"
            fail=1
          fi
          if (( stale > MAX_STALE )); then
            echo "::error title=Stale sources::stale_count=${stale} exceeds threshold ${MAX_STALE}"
            fail=1
          fi
          if (( high_failure > MAX_HIGH_FAILURE )); then
            echo "::error title=High failure count::high_failure_count=${high_failure} exceeds threshold ${MAX_HIGH_FAILURE}"
            fail=1
          fi
          if [[ -n "$db_quota_pct" ]] && [[ "$db_quota_pct" =~ $int_re ]] && (( db_quota_pct > MAX_DB_QUOTA_PCT )); then
            db_pretty=$(echo "$response" | jq -r '.database.size_pretty')
            echo "::error title=DB quota::database is at ${db_quota_pct}% of quota (${db_pretty}), exceeds threshold ${MAX_DB_QUOTA_PCT}%"
            fail=1
          fi

          # Shared metrics table for the Job Summary (rendered on both paths).
          db_disp="${db_quota_pct:-n/a}"
          [ "$db_disp" != "n/a" ] && db_disp="${db_disp}%"
          metrics_table() {
            echo "| Metric | Value | Threshold |"
            echo "|--------|-------|-----------|"
            echo "| circuit_open | ${circuit_open} | ${MAX_CIRCUIT_OPEN} |"
            echo "| stale | ${stale} | ${MAX_STALE} |"
            echo "| high_failure | ${high_failure} | ${MAX_HIGH_FAILURE} |"
            echo "| db_quota_pct | ${db_disp} | ${MAX_DB_QUOTA_PCT}% |"
          }

          if (( fail == 1 )); then
            {
              echo "## Source Health Watchdog ❌"
              echo ""
              echo "One or more thresholds exceeded — see the annotations above."
              echo ""
              metrics_table
            } >> "$GITHUB_STEP_SUMMARY"
            echo ""
            echo "Sources triggering the alert:"
            echo "$response" | jq '.sources | map(select(
              .circuit_open == true or
              .consecutive_failures >= 3 or
              (.is_active and .articles_last_24h == 0)
            ))'
            exit 1
          fi

          # Success: populate the Annotations box (notice) + the Job Summary.
          # Render the db part cleanly when the size RPC was unavailable (n/a)
          # rather than the awkward "n/a/60%".
          if [ "$db_disp" = "n/a" ]; then
            db_part="db_quota=n/a"
          else
            db_part="db_quota=${db_disp}/${MAX_DB_QUOTA_PCT}%"
          fi
          echo "::notice title=Source Health::OK — circuit_open=${circuit_open}/${MAX_CIRCUIT_OPEN}, stale=${stale}/${MAX_STALE}, high_failure=${high_failure}/${MAX_HIGH_FAILURE}, ${db_part}"
          {
            echo "## Source Health Watchdog ✅"
            echo ""
            metrics_table
          } >> "$GITHUB_STEP_SUMMARY"
