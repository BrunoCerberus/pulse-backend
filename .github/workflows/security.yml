name: Security Audit

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    # Weekly on Mondays at 06:00 UTC — catches newly disclosed CVEs
    # in dependencies even when no new commits land.
    - cron: '0 6 * * 1'
  workflow_dispatch:

# Default to least privilege. Individual jobs widen this when they need to —
# the go-sast and trivy jobs add `security-events: write` to upload their SARIF
# to the Security tab (alongside CodeQL from codeql.yml). This repo is public,
# so code scanning is available without GitHub Advanced Security.
permissions:
  contents: read

# Cancel superseded PR runs; let scheduled and push-to-master runs complete.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ---------------------------------------------------------------------------
  # Secret scanning
  # Detects leaked credentials in source code and full git history.
  # Two tools are used together because they complement each other:
  #   - gitleaks: fast regex-based scanner; sweeps the entire commit history.
  #   - TruffleHog: verifies detected secrets against live APIs
  #     (--results=verified,unknown) to drastically reduce false positives.
  # ---------------------------------------------------------------------------
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Full git history is required so gitleaks can scan all commits.
          fetch-depth: 0

      - name: Install gitleaks
        env:
          # Bump both together — see https://github.com/gitleaks/gitleaks/releases
          # (sha256 from the release's gitleaks_<ver>_checksums.txt).
          GITLEAKS_VERSION: "8.30.1"
          GITLEAKS_SHA256: "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb"
        run: |
          # Verify against the checksum pinned above before extracting: release
          # assets are mutable, so a version pin alone doesn't stop a compromised
          # upstream from swapping the tarball behind the same tag. This mirrors
          # the SHA-pinning we already do for actions.
          curl -sSL -o /tmp/gitleaks.tar.gz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          echo "${GITLEAKS_SHA256}  /tmp/gitleaks.tar.gz" | sha256sum -c -
          sudo tar -xz -C /usr/local/bin -f /tmp/gitleaks.tar.gz gitleaks
          gitleaks version

      - name: Run gitleaks
        # Exits non-zero on any finding. --redact hides secret values in logs.
        run: gitleaks detect --source . --verbose --redact --no-banner

      - name: Run gitleaks (LGPD/GDPR custom PII rules)
        # Second sweep with the conformance rules (CPF/CNPJ, IBAN, SSN, …) on
        # top of the default ruleset. Lives here — not in the two conformance
        # workflows — so each PR pays for ONE custom-rules history sweep and one
        # gitleaks install instead of three. The conformance workflows' summaries
        # point at this job.
        run: gitleaks detect --source . --verbose --redact --no-banner --config .github/lgpd-gdpr-rules.toml

      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@30d5bb91af1a771378349dbbb0c82129392acf70 # v3.95.6
        with:
          # The action injects --fail automatically; adding it to extra_args
          # causes "flag 'fail' cannot be repeated".
          extra_args: --results=verified,unknown

      - name: Annotate secret scan
        if: success()
        shell: bash
        run: |
          echo "::notice title=Secret Scan::no leaked secrets (gitleaks default + LGPD/GDPR rules + TruffleHog verified)"
          {
            echo "## Secret Scan ✅"
            echo ""
            echo "- gitleaks: full git-history sweep (default rules) — no findings"
            echo "- gitleaks: full git-history sweep (LGPD/GDPR custom PII rules) — no findings"
            echo "- TruffleHog: verified scan — no findings"
          } >> "$GITHUB_STEP_SUMMARY"

  # ---------------------------------------------------------------------------
  # Go SAST (gosec)
  # Static analysis for Go source — flags SQL injection, hardcoded
  # credentials, weak crypto, unsafe HTTP clients, and other insecure patterns.
  # Severity/confidence filters keep the signal-to-noise ratio high.
  # ---------------------------------------------------------------------------
  go-sast:
    name: Go SAST (gosec)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write  # upload gosec SARIF to the Security tab
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: ./.github/actions/setup-go-worker

      - name: Install gosec
        env:
          # Bump both together (see https://github.com/securego/gosec/releases;
          # sha256 from the release's gosec_<ver>_checksums.txt).
          # Using the prebuilt binary avoids `go install`'s strict toolchain
          # check, which rejects gosec releases that bump their own go.mod
          # past the project's Go version.
          GOSEC_VERSION: "v2.22.11"
          GOSEC_SHA256: "a9a3fb304a78cd22f4f3673403c70c2ad03011da876c9ca14e17244599d4f0ab"
        run: |
          # Download the PINNED release tarball directly instead of gosec's
          # install.sh — that script resolves the tag through the
          # UNAUTHENTICATED GitHub API, which gets rate-limited (HTTP 403) on
          # shared runner IPs and then misreports the pinned tag as "not found"
          # (the failure mode we hit). A direct asset download makes no API call.
          # Release assets are mutable, so also verify the sha256 pinned above
          # before extracting — a version pin alone doesn't stop a compromised
          # upstream from swapping the tarball behind the same tag. Install to a
          # user-writable dir (no `sudo`, no root) and put it on PATH.
          mkdir -p "$HOME/.local/bin"
          ver="${GOSEC_VERSION#v}"
          curl -sSfL --retry 3 --retry-delay 2 -o /tmp/gosec.tar.gz \
            "https://github.com/securego/gosec/releases/download/${GOSEC_VERSION}/gosec_${ver}_linux_amd64.tar.gz"
          echo "${GOSEC_SHA256}  /tmp/gosec.tar.gz" | sha256sum -c -
          tar -xz -C "$HOME/.local/bin" -f /tmp/gosec.tar.gz gosec
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/gosec" --version

      - name: Run gosec
        working-directory: ./rss-worker
        # Write SARIF for the Security tab. gosec still exits non-zero on a
        # finding, so this step remains the gate; the upload runs via
        # if: always() so results surface even when the gate trips.
        run: gosec -fmt sarif -out results.sarif -severity medium -confidence medium ./...

      - name: Upload gosec SARIF
        # Skip on fork PRs (read-only token can't write security-events); the
        # gosec gate above still runs there. Same-repo PRs + push + schedule upload.
        if: ${{ always() && hashFiles('rss-worker/results.sarif') != '' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: rss-worker/results.sarif
          category: gosec

      - name: Annotate gosec result
        if: success()
        shell: bash
        run: |
          echo "::notice title=Go SAST (gosec)::no findings at severity≥medium, confidence≥medium"
          {
            echo "## Go SAST (gosec) ✅"
            echo ""
            echo "- gosec: no findings (severity ≥ medium, confidence ≥ medium)"
          } >> "$GITHUB_STEP_SUMMARY"

  # ---------------------------------------------------------------------------
  # Go dependency vulnerabilities (govulncheck)
  # Scans go.mod against the official Go vulnerability database. Runs on
  # schedule so that newly disclosed CVEs surface even without new commits.
  # (test.yml also runs this on every PR for fast feedback.)
  # ---------------------------------------------------------------------------
  go-vuln:
    name: Go Vulnerabilities (govulncheck)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: ./.github/actions/setup-go-worker

      - name: Run govulncheck
        uses: golang/govulncheck-action@b625fbe08f3bccbe446d94fbf87fcc875a4f50ee # v1.0.4
        with:
          # Pin govulncheck's Go to go.mod (not the action's default "stable",
          # which resolves to an unpatched runner Go) so it reports against the
          # project's actual patched toolchain. See test.yml for the rationale.
          go-version-input: ""
          go-version-file: rss-worker/go.mod
          work-dir: ./rss-worker
          repo-checkout: false

      - name: Annotate govulncheck result
        if: success()
        shell: bash
        run: |
          echo "::notice title=Go Vulnerabilities::govulncheck found no known vulnerabilities"
          {
            echo "## Go Vulnerabilities (govulncheck) ✅"
            echo ""
            echo "- govulncheck: no known vulnerabilities in the import graph"
          } >> "$GITHUB_STEP_SUMMARY"

  # ---------------------------------------------------------------------------
  # Trivy filesystem scan
  # Single tool, three scanners: vuln (dependency CVEs across ecosystems),
  # secret (additional secret regex patterns), and misconfig (Dockerfiles,
  # GitHub workflows, IaC). Covers what Go-only tools miss — Deno Edge
  # Functions, workflow files, and config drift.
  # ---------------------------------------------------------------------------
  trivy:
    name: Trivy Filesystem Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write  # upload Trivy SARIF to the Security tab
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Run Trivy
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          severity: CRITICAL,HIGH
          # SARIF for the Security tab; trivy writes the report before applying
          # exit-code, so the gate (exit-code 1 on a CRITICAL/HIGH finding) and
          # the upload below (if: always()) coexist.
          format: sarif
          output: trivy-results.sarif
          exit-code: "1"
          # Ignore CVEs that have no fix available — keeps the report actionable.
          ignore-unfixed: true

      - name: Upload Trivy SARIF
        # Skip on fork PRs (read-only token); the trivy gate above still runs there.
        if: ${{ always() && hashFiles('trivy-results.sarif') != '' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: trivy-results.sarif
          category: trivy-fs

      - name: Annotate Trivy result
        if: success()
        shell: bash
        run: |
          echo "::notice title=Trivy::no CRITICAL/HIGH vuln, secret, or misconfig findings"
          {
            echo "## Trivy Filesystem Scan ✅"
            echo ""
            echo "- Scanners: vuln, secret, misconfig"
            echo "- Gate: CRITICAL, HIGH (unfixed ignored) — no findings"
          } >> "$GITHUB_STEP_SUMMARY"

  # ---------------------------------------------------------------------------
  # Software Bill of Materials (SBOM)
  # Generates a CycloneDX SBOM for the whole repo and stores it as a workflow
  # artifact. Useful for supply-chain audits and downstream vulnerability
  # monitoring (the artifact can be scanned later without the original source).
  # ---------------------------------------------------------------------------
  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Generate CycloneDX SBOM
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: cyclonedx
          output: sbom.cdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom-cyclonedx
          path: sbom.cdx.json
          retention-days: 90

      - name: Annotate SBOM result
        if: success()
        shell: bash
        run: |
          echo "::notice title=SBOM::CycloneDX SBOM generated and uploaded (sbom-cyclonedx, 90d retention)"
          {
            echo "## SBOM ✅"
            echo ""
            echo "- Format: CycloneDX (\`sbom.cdx.json\`)"
            echo "- Artifact: \`sbom-cyclonedx\` (90-day retention)"
          } >> "$GITHUB_STEP_SUMMARY"
