name: PR Checks

# PR-only guards that the primary test/security workflows don't cover:
#   - PR title must follow conventional commits (squash-merge uses it as
#     the commit message on master, so bad titles rot the history).
#   - go.mod / go.sum must be in sync — catches missed `go mod tidy`.
#   - Migration filenames follow NNN_*.sql with no gaps in the sequence.
#
# Runs in parallel with test.yml and security.yml on every PR against master.

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]
    branches: [master]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  pr-title:
    name: PR Title Conventional Commits
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Validate PR title
        # Dependabot's auto-generated titles use "Bump …" (capitalized) and
        # aren't configurable. Trust its standard format and skip the check.
        # Use pull_request.user.login (PR author) — github.actor reflects
        # whoever triggered the run, which becomes a human when they click
        # "Update branch" or comment "@dependabot rebase".
        if: github.event.pull_request.user.login != 'dependabot[bot]'
        uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v6.1.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Conventional-commits prefixes allowed in PR titles.
          types: |
            feat
            fix
            chore
            docs
            refactor
            perf
            test
            ci
            build
            style
            revert
          requireScope: false
          subjectPattern: ^[a-z].+$
          subjectPatternError: |
            The subject of the PR title must start with a lowercase letter and
            contain at least two characters. Example: `feat: add rate limiter`.

      # The action annotates its own error on a bad title; this records the
      # clean pass. if:success() also covers the dependabot-skipped case (a
      # skipped step does not fail success()).
      - name: Annotate PR title result
        if: success()
        shell: bash
        run: |
          echo "::notice title=PR Title::title follows conventional commits (or skipped for dependabot)"
          {
            echo "## PR Title Conventional Commits ✅"
            echo ""
            echo "- Title follows conventional commits (or skipped for dependabot)"
          } >> "$GITHUB_STEP_SUMMARY"

  gomod-sync:
    name: go.mod Sync
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25"
          cache: true
          cache-dependency-path: rss-worker/go.sum

      - name: Verify go.mod / go.sum are tidy
        working-directory: ./rss-worker
        run: |
          go mod tidy
          if ! git diff --exit-code -- go.mod go.sum; then
            echo "::error::go.mod or go.sum is out of sync. Run 'go mod tidy' in rss-worker/ and commit the result."
            exit 1
          fi
          echo "::notice title=go.mod Sync::go.mod / go.sum are tidy"
          {
            echo "## go.mod Sync ✅"
            echo ""
            echo "- \`go mod tidy\` produced no diff"
          } >> "$GITHUB_STEP_SUMMARY"

  migration-format:
    name: Migration Format
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Validate migration filenames and sequence
        shell: bash
        run: |
          set -euo pipefail
          dir=supabase/migrations
          if [ ! -d "$dir" ]; then
            echo "No $dir directory; skipping."
            exit 0
          fi

          shopt -s nullglob
          files=("$dir"/*.sql)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No migration files."
            exit 0
          fi

          bad=0
          nums=()
          for f in "${files[@]}"; do
            base=$(basename "$f")
            if [[ ! "$base" =~ ^[0-9]{3}_.+\.sql$ ]]; then
              echo "::error file=$f::Does not match NNN_*.sql pattern (3-digit prefix + underscore + name)."
              bad=1
              continue
            fi
            nums+=("${base:0:3}")
          done

          # Check for gaps in the sequence (001, 002, ...).
          mapfile -t sorted < <(printf '%s\n' "${nums[@]}" | sort -n)
          expected=1
          for n in "${sorted[@]}"; do
            decimal=$((10#$n))
            if [ "$decimal" -ne "$expected" ]; then
              printf -v want '%03d' "$expected"
              echo "::error::Migration sequence gap: expected $want, got $n"
              bad=1
              break
            fi
            expected=$((expected + 1))
          done

          # Check for duplicate prefixes.
          dup=$(printf '%s\n' "${nums[@]}" | sort | uniq -d || true)
          if [ -n "$dup" ]; then
            echo "::error::Duplicate migration prefixes: $dup"
            bad=1
          fi

          if [ "$bad" -eq 0 ]; then
            count=${#files[@]}
            echo "::notice title=Migration Format::${count} migrations — naming + sequence valid"
            {
              echo "## Migration Format ✅"
              echo ""
              echo "- ${count} migration files"
              echo "- \`NNN_*.sql\` naming, contiguous sequence, no duplicate prefixes"
            } >> "$GITHUB_STEP_SUMMARY"
          fi

          exit $bad
