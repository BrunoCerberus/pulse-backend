name: PR Checks

# PR-only guards that the primary test/security workflows don't cover:
#   - PR title must follow conventional commits (squash-merge uses it as
#     the commit message on master, so bad titles rot the history).
#   - go.mod / go.sum must be in sync — catches missed `go mod tidy`.
#   - Migration filenames follow NNN_*.sql with no gaps in the sequence.
#
# Runs in parallel with test.yml and security.yml on every PR against master.

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]
    branches: [master]

permissions:
  contents: read
  pull-requests: read

jobs:
  pr-title:
    name: PR Title Conventional Commits
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR title
        uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v6.1.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Conventional-commits prefixes allowed in PR titles.
          types: |
            feat
            fix
            chore
            docs
            refactor
            perf
            test
            ci
            build
            style
            revert
          requireScope: false
          subjectPattern: ^[a-z].+$
          subjectPatternError: |
            The subject of the PR title must start with a lowercase letter and
            contain at least two characters. Example: `feat: add rate limiter`.

  gomod-sync:
    name: go.mod Sync
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.24"
          cache: true
          cache-dependency-path: rss-worker/go.sum

      - name: Verify go.mod / go.sum are tidy
        working-directory: ./rss-worker
        run: |
          go mod tidy
          if ! git diff --exit-code -- go.mod go.sum; then
            echo "::error::go.mod or go.sum is out of sync. Run 'go mod tidy' in rss-worker/ and commit the result."
            exit 1
          fi

  migration-format:
    name: Migration Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Validate migration filenames and sequence
        shell: bash
        run: |
          set -euo pipefail
          dir=supabase/migrations
          if [ ! -d "$dir" ]; then
            echo "No $dir directory; skipping."
            exit 0
          fi

          shopt -s nullglob
          files=("$dir"/*.sql)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No migration files."
            exit 0
          fi

          bad=0
          nums=()
          for f in "${files[@]}"; do
            base=$(basename "$f")
            if [[ ! "$base" =~ ^[0-9]{3}_.+\.sql$ ]]; then
              echo "::error file=$f::Does not match NNN_*.sql pattern (3-digit prefix + underscore + name)."
              bad=1
              continue
            fi
            nums+=("${base:0:3}")
          done

          # Check for gaps in the sequence (001, 002, ...).
          IFS=$'\n' sorted=($(printf '%s\n' "${nums[@]}" | sort -n)); unset IFS
          expected=1
          for n in "${sorted[@]}"; do
            decimal=$((10#$n))
            if [ "$decimal" -ne "$expected" ]; then
              printf -v want '%03d' "$expected"
              echo "::error::Migration sequence gap: expected $want, got $n"
              bad=1
              break
            fi
            expected=$((expected + 1))
          done

          # Check for duplicate prefixes.
          dup=$(printf '%s\n' "${nums[@]}" | sort | uniq -d || true)
          if [ -n "$dup" ]; then
            echo "::error::Duplicate migration prefixes: $dup"
            bad=1
          fi

          exit $bad
