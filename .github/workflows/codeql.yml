name: "CodeQL"

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: "0 0 * * 1"

permissions:
  contents: read
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  analyze:
    # Per-language context so each is distinct and individually requireable:
    # "CodeQL go" / "CodeQL javascript-typescript".
    name: CodeQL ${{ matrix.language }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      # Analyze every language even if one fails — a Go failure must not hide
      # a TypeScript finding (or vice versa).
      fail-fast: false
      matrix:
        include:
          # Go: compiled — autobuild produces the database.
          - language: go
            build-mode: autobuild
          # TypeScript (Deno Edge Functions): interpreted — no build step.
          - language: javascript-typescript
            build-mode: none
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          category: "/language:${{ matrix.language }}"

      - name: Annotate CodeQL result
        if: success()
        shell: bash
        env:
          LANGUAGE: ${{ matrix.language }}
        run: |
          echo "::notice title=CodeQL::${LANGUAGE} analysis complete — results in the Security tab"
          {
            echo "## CodeQL (${LANGUAGE}) ✅"
            echo ""
            echo "- Language: ${LANGUAGE}"
            echo "- Findings (if any) are reported in the repository Security tab"
          } >> "$GITHUB_STEP_SUMMARY"
