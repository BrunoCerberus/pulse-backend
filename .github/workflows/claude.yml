name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

# One Claude run at a time per issue/PR; don't cancel an in-flight run — it may
# be mid-way through posting its comment/review.
concurrency:
  group: claude-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  claude:
    # Restrict to repo owner/members/collaborators so a drive-by commenter
    # can't trigger a billed Opus run or leverage `pull-requests: write` via
    # prompt injection. author_association is set by GitHub on every comment
    # event and is not user-controlled.
    if: |
      (
        (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude') &&
          (github.event.comment.author_association == 'OWNER' ||
           github.event.comment.author_association == 'MEMBER' ||
           github.event.comment.author_association == 'COLLABORATOR')) ||
        (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude') &&
          (github.event.comment.author_association == 'OWNER' ||
           github.event.comment.author_association == 'MEMBER' ||
           github.event.comment.author_association == 'COLLABORATOR')) ||
        (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude') &&
          (github.event.review.author_association == 'OWNER' ||
           github.event.review.author_association == 'MEMBER' ||
           github.event.review.author_association == 'COLLABORATOR')) ||
        (github.event_name == 'issues' &&
          (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')) &&
          (github.event.issue.author_association == 'OWNER' ||
           github.event.issue.author_association == 'MEMBER' ||
           github.event.issue.author_association == 'COLLABORATOR'))
      )
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@686da461dadac38c2bde9089909de4042a75ebf0 # v1
        env:
          CLAUDE_CODE_EFFORT_LEVEL: low
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          # This is an optional setting that allows Claude to read CI results on PRs
          additional_permissions: |
            actions: read

          # Optional: Give a custom prompt to Claude. If this is not specified, Claude will perform the instructions specified in the comment that tagged it.
          # prompt: 'Update the pull request description to include a summary of changes.'

          # Optional: Add claude_args to customize behavior and configuration
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options
          claude_args: '--model claude-sonnet-4-6'

      # The action's substantive output is the comment/review it posts; this is
      # just a run-completion marker. always() so a failed run is visible too.
      - name: Annotate Claude run
        if: always()
        shell: bash
        env:
          CLAUDE_OUTCOME: ${{ steps.claude.outcome }}
        run: |
          # Match annotation severity to the outcome so a red/cancelled run
          # doesn't surface a green-looking ::notice:: in the Annotations box.
          if [ "$CLAUDE_OUTCOME" = "success" ]; then
            echo "::notice title=Claude Code::run succeeded — see the posted comment for details"
            icon="✅"
          else
            echo "::warning title=Claude Code::run ${CLAUDE_OUTCOME} — see logs / the posted comment"
            icon="⚠️"
          fi
          {
            echo "## Claude Code ${icon}"
            echo ""
            echo "- Run outcome: **${CLAUDE_OUTCOME}**"
            echo "- Output posted as an issue/PR comment by the action"
          } >> "$GITHUB_STEP_SUMMARY"
