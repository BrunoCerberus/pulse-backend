name: Fetch RSS Feeds

on:
  # Run every 2 hours
  schedule:
    - cron: '0 */2 * * *'

  # Allow manual trigger. Cleanup is NOT an option here — it runs exclusively
  # in cleanup.yml under its own concurrency group; routing it through this
  # workflow would let a destructive batch-delete race the cleanup cron.
  workflow_dispatch:

permissions:
  contents: read

# Never let a manual dispatch overlap a scheduled run (or vice versa) — two
# workers writing to the same DB concurrently would duplicate fetch work.
# cancel-in-progress: false so an in-flight batch is allowed to finish.
concurrency:
  group: fetch-rss
  cancel-in-progress: false

jobs:
  fetch:
    name: Fetch RSS Feeds
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: ./.github/actions/setup-go-worker

      - name: Build worker
        working-directory: rss-worker
        run: |
          # Modules are pinned via go.sum; the pr-checks workflow enforces
          # tidiness on every PR so we don't need (and don't want) `go mod
          # tidy` here — it can silently pull a different module graph if
          # an upstream go.mod changed.
          go build -o rss-worker .

      - name: Run RSS Worker
        id: run
        working-directory: rss-worker
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          # pipefail so a non-zero worker exit isn't masked by tee's success.
          # The worker logs to stderr, so 2>&1 routes its summary line into the
          # tee'd file for the "Annotate run summary" step below to parse.
          set -o pipefail
          ./rss-worker 2>&1 | tee /tmp/worker.log

      # Surface what the run did in the Annotations box + the run's Job Summary.
      # always() so a failed run still annotates, but branch on the Run step's
      # outcome: the worker can exit non-zero *after* printing its summary line
      # (late panic / partial failure), so a red run must never show a green ✅.
      # The grep matches the human-readable core of the worker's stable summary
      # line, so it works for both the text and json log formats.
      - name: Annotate run summary
        if: always()
        shell: bash
        env:
          RUN_OUTCOME: ${{ steps.run.outcome }}
        run: |
          log=/tmp/worker.log
          summary=""
          if [ -f "$log" ]; then
            summary=$(grep -oE 'Summary: sources=[0-9]+, fetched=[0-9]+, inserted=[0-9]+, skipped=[0-9]+, errors=[0-9]+' "$log" | tail -1 || true)
          fi
          if [ "$RUN_OUTCOME" = "success" ]; then
            echo "::notice title=Fetch RSS Feeds::${summary:-run completed}"
            {
              echo "## Fetch RSS Feeds ✅"
              echo ""
              echo "- ${summary:-run completed (no summary line captured)}"
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "::error title=Fetch RSS Feeds::run ${RUN_OUTCOME}${summary:+ — last summary: ${summary}}"
            {
              echo "## Fetch RSS Feeds ❌"
              echo ""
              echo "- Run outcome: **${RUN_OUTCOME}**"
              echo "- Last summary line: ${summary:-none captured}"
            } >> "$GITHUB_STEP_SUMMARY"
          fi

  # Cleanup is handled exclusively by `cleanup.yml` (separate workflow), under
  # its own `cleanup` concurrency group. This workflow only ever fetches, so a
  # manual run here can never race the daily 03:00 UTC cleanup cron.
