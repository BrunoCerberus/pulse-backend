name: Fetch RSS Feeds

on:
  # Run every 2 hours
  schedule:
    - cron: '0 */2 * * *'

  # Allow manual trigger
  workflow_dispatch:
    inputs:
      cleanup:
        description: 'Run cleanup instead of fetch'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: read

jobs:
  fetch:
    name: Fetch RSS Feeds
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Go
        uses: actions/setup-go@3041bf56c941b39c61721a86cd11f3bb1338122a # v5.2.0
        with:
          go-version: '1.24'
          cache: true
          cache-dependency-path: rss-worker/go.sum

      - name: Build worker
        working-directory: rss-worker
        run: |
          go mod tidy
          go build -o rss-worker .

      - name: Run RSS Worker
        working-directory: rss-worker
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DO_CLEANUP: ${{ github.event.inputs.cleanup }}
        run: |
          if [ "$DO_CLEANUP" = "true" ]; then
            ./rss-worker cleanup
          else
            ./rss-worker
          fi

  # Cleanup job runs once daily at 3 AM UTC
  cleanup:
    name: Cleanup Old Articles
    runs-on: ubuntu-latest
    timeout-minutes: 5

    # Only run on schedule at 3 AM UTC (not on every 2-hour trigger)
    if: github.event.schedule == '0 3 * * *' || github.event.inputs.cleanup == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Go
        uses: actions/setup-go@3041bf56c941b39c61721a86cd11f3bb1338122a # v5.2.0
        with:
          go-version: '1.24'
          cache: true
          cache-dependency-path: rss-worker/go.sum

      - name: Build and run cleanup
        working-directory: rss-worker
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          go mod tidy
          go build -o rss-worker .
          ./rss-worker cleanup
