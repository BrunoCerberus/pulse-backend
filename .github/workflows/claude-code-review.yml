name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
    # Optional: Only run on specific file changes
    # paths:
    #   - "src/**/*.ts"
    #   - "src/**/*.tsx"
    #   - "src/**/*.js"
    #   - "src/**/*.jsx"

jobs:
  claude-review:
    # Only run on PRs from trusted authors. Fork PRs from external contributors
    # carry attacker-controlled diff/title/body that the action ingests as
    # input; combined with `pull-requests: write` + the OAuth token, this is
    # an indirect-prompt-injection vector (PR auto-approve via fake comment).
    if: |
      github.event.pull_request.author_association == 'OWNER' ||
      github.event.pull_request.author_association == 'MEMBER' ||
      github.event.pull_request.author_association == 'COLLABORATOR'

    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: write
      # Note: `issues: write` removed — the review action posts PR comments,
      # not issue comments. Dropping it shrinks the blast radius if the
      # action is ever coerced via prompt injection.
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      - name: Clean up stale bot comments from previous runs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"

          # Delete inline review comments from this bot (pulls/comments endpoint).
          inline_count=0
          resp=$(curl -s \
            "https://api.github.com/repos/${{ github.repository }}/pulls/${PR_NUMBER}/comments?per_page=100")
          ids=$(echo "$resp" | jq -r '.[] | select(.user.login == "github-actions[bot]" and (.body != null) and (.body | test("claude-code-review"))) | .id')
          for rid in $ids; do
            gh api "repos/${{ github.repository }}/pulls/comments/$rid" --method DELETE > /dev/null 2>&1 && inline_count=$((inline_count + 1))
          done

          # Delete body comments from previous runs (issues/comments endpoint).
          body_count=0
          resp=$(curl -s \
            "https://api.github.com/repos/${{ github.repository }}/issues/${PR_NUMBER}/comments?per_page=100")
          ids=$(echo "$resp" | jq -r '.[] | select(.user.login == "github-actions[bot]" and (.body != null) and (.body | test("Claude Code Review"))) | .id')
          for cid in $ids; do
            gh api "repos/${{ github.repository }}/issues/comments/$cid" --method DELETE > /dev/null 2>&1 && body_count=$((body_count + 1))
          done

          if [ $((inline_count + body_count)) -gt 0 ]; then
            echo "Cleaned up $((inline_count + body_count)) stale bot comments ($inline_count inline, $body_count summary)."
          else
            echo "No stale bot comments found."
          fi

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@686da461dadac38c2bde9089909de4042a75ebf0 # v1
        env:
          CLAUDE_CODE_EFFORT_LEVEL: max
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true
          allowed_bots: "dependabot[bot]"
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Review this PR for code quality, bugs, security, and performance.

            STRICT OUTPUT RULES:
            - Every finding tied to a specific file:line MUST be posted via
              `mcp__github_inline_comment__create_inline_comment`. Do NOT embed
              file:line findings in the top-level summary.
            - Your progress/summary comment must contain only: a high-level verdict,
              counts of findings by severity, and cross-cutting observations that
              don't map to a single line.
            - If you have zero line-level findings to leave, say so explicitly in
              the summary — do not substitute prose for inline comments.

            STALE COMMENT CLEANUP:
            Before posting any new inline review comments, clean up your own stale
            comments from previous runs so only fresh findings remain:

              gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/comments \
                --jq '.[] | select(.user.login == "github-actions[bot]" and (.body != null) and (.body | test("claude-code-review"))) | .id' \
                | xargs -I{} gh api repos/${{ github.repository }}/pulls/comments/{} --method DELETE > /dev/null 2>&1

            Approvals: if no significant issues, run `gh pr review --approve`.
            If significant issues, run `gh pr review --request-changes`.
            Never leave review verdicts only as prose.
          claude_args: '--model claude-sonnet-4-6 --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr review:*),Bash(gh api repos/*/pulls/comments/*:*),Bash(gh api repos/*/issues/comments/*:*)"'
