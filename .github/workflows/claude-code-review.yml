name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
    # Optional: Only run on specific file changes
    # paths:
    #   - "src/**/*.ts"
    #   - "src/**/*.tsx"
    #   - "src/**/*.js"
    #   - "src/**/*.jsx"

jobs:
  claude-review:
    # Optional: Filter by PR author
    # if: |
    #   github.event.pull_request.user.login == 'external-contributor' ||
    #   github.event.pull_request.user.login == 'new-developer' ||
    #   github.event.pull_request.author_association == 'FIRST_TIME_CONTRIBUTOR'

    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@686da461dadac38c2bde9089909de4042a75ebf0 # v1
        env:
          CLAUDE_CODE_EFFORT_LEVEL: max
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true
          allowed_bots: "dependabot[bot]"
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Review this PR for code quality, bugs, security, and performance.

            STRICT OUTPUT RULES:
            - Every finding tied to a specific file:line MUST be posted via
              `mcp__github_inline_comment__create_inline_comment`. Do NOT embed
              file:line findings in the top-level summary.
            - Your progress/summary comment must contain only: a high-level verdict,
              counts of findings by severity, and cross-cutting observations that
              don't map to a single line.
            - If you have zero line-level findings to leave, say so explicitly in
              the summary — do not substitute prose for inline comments.

            Approvals: if no significant issues, run `gh pr review --approve`.
            If significant issues, run `gh pr review --request-changes`.
            Never leave review verdicts only as prose.
          claude_args: '--model claude-opus-4-7 --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr review:*)"'
