name: GDPR Conformance

# Conformance guard rails for the General Data Protection Regulation
# (Regulation (EU) 2016/679 — GDPR). See docs/gdpr-conformance.md for the
# substantive position; this workflow keeps that position true over time.
#
# Four parallel jobs:
#   - pii-scan              Bans IBAN + EU/EEA phone patterns (GDPR-specific,
#                           inline below) plus the shared SSN / email / IP-code
#                           guard rails.
#   - docs-presence         Required privacy / GDPR / ROPA / retention docs.
#   - operational-controls  Cleanup workflow, retention literal, no-plaintext-
#                           HTTP migrations, RLS, no-PII-redaction invariant.
#   - structural-integrity  Bans new tables outside the allowlist and
#                           suspicious column names that imply PII storage.
#
# Steps shared with lgpd-conformance.yml live in the
# .github/actions/conformance-* composite actions — fix them there, once.
# The gitleaks custom-rules history sweep runs in security.yml (secret-scan
# job) so each PR pays for one sweep, not one per regulation.

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    # Weekly, one hour after security.yml so newly-detected issues land in
    # consecutive Monday-morning notifications.
    - cron: '0 7 * * 1'
  workflow_dispatch:

permissions:
  contents: read

# Cancel stale in-progress runs of this workflow on the same ref. PRs that
# get rapid pushes drop their older runs; master and the weekly cron always
# run to completion so we don't lose audit signal.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ---------------------------------------------------------------------------
  # PII scan: IBAN + EU phone patterns (GDPR-specific), then the shared
  # SSN / email-allowlist / IP-handling guard rails via the composite action.
  # ---------------------------------------------------------------------------
  pii-scan:
    name: GDPR PII Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # rg is NOT preinstalled on ubuntu runners; without it the `if rg …`
      # guards below silently pass (exit 127 looks like "no match"), which is
      # exactly what happened until 2026-07.
      - name: Ensure ripgrep
        uses: ./.github/actions/ensure-ripgrep

      - name: IBAN pattern ban
        shell: bash
        run: |
          set -euo pipefail
          IBAN_RE='\b[A-Z]{2}[0-9]{2}(?:[ ]?[A-Z0-9]{4}){2,7}(?:[A-Z0-9]{1,4})?\b'

          # Exclusion list mirrors the [allowlist] paths in
          # .github/lgpd-gdpr-rules.toml so the regex pass and the gitleaks
          # pass agree on where illustrative examples are allowed.
          if rg --pcre2 \
              -g '!docs/privacy.md' \
              -g '!docs/lgpd-conformance.md' \
              -g '!docs/gdpr-conformance.md' \
              -g '!docs/ccpa-conformance.md' \
              -g '!docs/ropa.md' \
              -g '!docs/data-retention.md' \
              -g '!.github/lgpd-gdpr-rules.toml' \
              -g '!.github/pii-allowlist.txt' \
              -g '!.github/workflows/lgpd-conformance.yml' \
              -g '!.github/workflows/gdpr-conformance.yml' \
              -g '!.github/actions/conformance-pii-scan/action.yml' \
              -e "$IBAN_RE" \
              .; then
            echo "::error::IBAN pattern found. GDPR: no European bank-account identifiers may be stored in this repo."
            exit 1
          fi
          echo "OK: no IBAN patterns."

      - name: EU / EEA phone-number pattern ban
        shell: bash
        run: |
          set -euo pipefail
          # E.164-prefixed numbers using EU/EEA + UK + CH dialing codes only.
          # Restricting to the EU/EEA set keeps the false-positive surface
          # narrow: arbitrary international phone formats elsewhere in the
          # repo are not flagged.
          EU_PHONE_RE='\+(?:30|31|32|33|34|36|39|40|41|43|44|45|46|47|48|49|350|351|352|353|354|356|357|358|359|370|371|372|385|386|420|421|423)[ -]?[0-9]{6,12}\b'

          # Same exclusion list as the IBAN scan above.
          if rg --pcre2 \
              -g '!docs/privacy.md' \
              -g '!docs/lgpd-conformance.md' \
              -g '!docs/gdpr-conformance.md' \
              -g '!docs/ccpa-conformance.md' \
              -g '!docs/ropa.md' \
              -g '!docs/data-retention.md' \
              -g '!.github/lgpd-gdpr-rules.toml' \
              -g '!.github/pii-allowlist.txt' \
              -g '!.github/workflows/lgpd-conformance.yml' \
              -g '!.github/workflows/gdpr-conformance.yml' \
              -g '!.github/actions/conformance-pii-scan/action.yml' \
              -e "$EU_PHONE_RE" \
              .; then
            echo "::error::EU/EEA phone-number pattern found. GDPR: no European personal contact numbers may be stored in this repo."
            exit 1
          fi
          echo "OK: no EU/EEA phone patterns."

      - name: Shared PII guard rails (SSN, emails, IP-handling)
        uses: ./.github/actions/conformance-pii-scan
        with:
          regulation: GDPR
          doc: docs/gdpr-conformance.md

      # One per-job notice + a Job Summary checklist. if:success() means a
      # failing guard rail (which emits its own ::error::) skips this, so the
      # green tick is honest.
      - name: Annotate PII scan
        if: success()
        shell: bash
        run: |
          echo "::notice title=GDPR — PII Scan::all PII guard rails passed"
          {
            echo "## GDPR — PII Scan ✅"
            echo ""
            echo "- IBAN pattern ban"
            echo "- EU / EEA phone-number pattern ban"
            echo "- US SSN pattern ban (CCPA / CPRA)"
            echo "- Email allowlist enforcement"
            echo "- IP-handling code path ban (rss-worker)"
            echo "- gitleaks custom-rules history sweep: runs in security.yml (Secret Scan)"
          } >> "$GITHUB_STEP_SUMMARY"

  # ---------------------------------------------------------------------------
  # Docs presence: every privacy / GDPR doc must exist and be non-empty.
  # ---------------------------------------------------------------------------
  docs-presence:
    name: GDPR Docs Presence
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Required docs exist and are non-empty
        uses: ./.github/actions/conformance-docs-presence
        with:
          regulation: GDPR
          doc: docs/gdpr-conformance.md

      - name: Annotate docs presence
        if: success()
        shell: bash
        run: |
          echo "::notice title=GDPR — Docs Presence::all required privacy/GDPR docs present"
          {
            echo "## GDPR — Docs Presence ✅"
            echo ""
            echo "- docs/privacy.md, docs/gdpr-conformance.md, docs/ropa.md, docs/data-retention.md — present and non-empty"
          } >> "$GITHUB_STEP_SUMMARY"

  # ---------------------------------------------------------------------------
  # Operational controls: cleanup workflow + retention literal + no plaintext
  # HTTP in migrations + RLS-still-enabled + the no-PII-redaction invariant
  # is still asserted in docs/gdpr-conformance.md.
  # ---------------------------------------------------------------------------
  operational-controls:
    name: GDPR Operational Controls
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Retention + RLS + no-PII invariants
        uses: ./.github/actions/conformance-operational-controls
        with:
          regulation: GDPR
          doc: docs/gdpr-conformance.md

      - name: Annotate operational controls
        if: success()
        shell: bash
        run: |
          echo "::notice title=GDPR — Operational Controls::retention + RLS + no-PII invariants hold"
          {
            echo "## GDPR — Operational Controls ✅"
            echo ""
            echo "- cleanup.yml wired to \`rss-worker cleanup\`"
            echo "- ArticleRetentionDays = 7"
            echo "- no plaintext http:// in migrations"
            echo "- 'No PII redaction layer required' still asserted"
            echo "- RLS enabled on user-facing tables"
          } >> "$GITHUB_STEP_SUMMARY"

  # ---------------------------------------------------------------------------
  # Structural integrity: catches the realistic failure mode where a future
  # PR introduces PII processing without updating the conformance docs.
  # ---------------------------------------------------------------------------
  structural-integrity:
    name: GDPR Structural Integrity
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Schema + ROPA invariants
        uses: ./.github/actions/conformance-structural-integrity
        with:
          regulation: GDPR
          doc: docs/gdpr-conformance.md

      - name: Annotate structural integrity
        if: success()
        shell: bash
        run: |
          echo "::notice title=GDPR — Structural Integrity::schema + ROPA invariants hold"
          {
            echo "## GDPR — Structural Integrity ✅"
            echo ""
            echo "- only allowlisted tables (categories, sources, articles, fetch_logs)"
            echo "- no PII-implying column names in migrations"
            echo "- ROPA lists GitHub + Supabase subprocessors"
            echo "- retention doc declares '7 days'"
          } >> "$GITHUB_STEP_SUMMARY"
