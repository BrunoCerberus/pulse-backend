name: GDPR Conformance

# Conformance guard rails for the General Data Protection Regulation
# (Regulation (EU) 2016/679 — GDPR). See docs/gdpr-conformance.md for the
# substantive position; this workflow keeps that position true over time.
#
# Four parallel jobs:
#   - pii-scan              Bans IBAN + EU/EEA phone patterns, non-allowlisted
#                           emails, and IP-handling Go code paths in rss-worker.
#   - docs-presence         Required privacy / GDPR / ROPA / retention docs.
#   - operational-controls  Cleanup workflow, retention literal, no-plaintext-
#                           HTTP migrations, RLS, no-PII-redaction invariant.
#   - structural-integrity  Bans new tables outside the allowlist and
#                           suspicious column names that imply PII storage.

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    # Weekly, one hour after security.yml so newly-detected issues land in
    # consecutive Monday-morning notifications.
    - cron: '0 7 * * 1'
  workflow_dispatch:

permissions:
  contents: read

# Cancel stale in-progress runs of this workflow on the same ref. PRs that
# get rapid pushes drop their older runs; master and the weekly cron always
# run to completion so we don't lose audit signal.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ---------------------------------------------------------------------------
  # PII scan: IBAN + EU phone patterns, disallowed emails, IP-handling code,
  # plus a gitleaks pass over full git history using the custom rules file.
  # ---------------------------------------------------------------------------
  pii-scan:
    name: PII Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Full history so gitleaks can sweep every commit.
          fetch-depth: 0

      - name: IBAN pattern ban
        shell: bash
        run: |
          set -euo pipefail
          IBAN_RE='\b[A-Z]{2}[0-9]{2}(?:[ ]?[A-Z0-9]{4}){2,7}(?:[A-Z0-9]{1,4})?\b'

          # Exclusion list mirrors the [allowlist] paths in
          # .github/lgpd-gdpr-rules.toml so the regex pass and the gitleaks
          # pass agree on where illustrative examples are allowed.
          if rg --pcre2 \
              -g '!docs/privacy.md' \
              -g '!docs/lgpd-conformance.md' \
              -g '!docs/gdpr-conformance.md' \
              -g '!docs/ropa.md' \
              -g '!docs/data-retention.md' \
              -g '!.github/lgpd-gdpr-rules.toml' \
              -g '!.github/pii-allowlist.txt' \
              -g '!.github/workflows/lgpd-conformance.yml' \
              -g '!.github/workflows/gdpr-conformance.yml' \
              -e "$IBAN_RE" \
              .; then
            echo "::error::IBAN pattern found. GDPR: no European bank-account identifiers may be stored in this repo."
            exit 1
          fi
          echo "OK: no IBAN patterns."

      - name: EU / EEA phone-number pattern ban
        shell: bash
        run: |
          set -euo pipefail
          # E.164-prefixed numbers using EU/EEA + UK + CH dialing codes only.
          # Restricting to the EU/EEA set keeps the false-positive surface
          # narrow: arbitrary international phone formats elsewhere in the
          # repo are not flagged.
          EU_PHONE_RE='\+(?:30|31|32|33|34|36|39|40|41|43|44|45|46|47|48|49|350|351|352|353|354|356|357|358|359|370|371|372|385|386|420|421|423)[ -]?[0-9]{6,12}\b'

          # Same exclusion list as the IBAN scan above.
          if rg --pcre2 \
              -g '!docs/privacy.md' \
              -g '!docs/lgpd-conformance.md' \
              -g '!docs/gdpr-conformance.md' \
              -g '!docs/ropa.md' \
              -g '!docs/data-retention.md' \
              -g '!.github/lgpd-gdpr-rules.toml' \
              -g '!.github/pii-allowlist.txt' \
              -g '!.github/workflows/lgpd-conformance.yml' \
              -g '!.github/workflows/gdpr-conformance.yml' \
              -e "$EU_PHONE_RE" \
              .; then
            echo "::error::EU/EEA phone-number pattern found. GDPR: no European personal contact numbers may be stored in this repo."
            exit 1
          fi
          echo "OK: no EU/EEA phone patterns."

      - name: Email allowlist enforcement
        shell: bash
        run: |
          set -euo pipefail
          EMAIL_RE='\b[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}\b'

          # Both sides are lowercased before comparison: RFC 5321 specifies
          # the domain as case-insensitive and the local part is conventionally
          # treated as case-insensitive, so 'Bruno.Guitarpro@gmail.com' and
          # 'bruno.guitarpro@gmail.com' must compare equal.
          found=$(rg --pcre2 -o "$EMAIL_RE" \
            -g '!.github/pii-allowlist.txt' \
            --no-filename . 2>/dev/null \
            | tr '[:upper:]' '[:lower:]' \
            | sort -u || true)

          allowed=$(grep -vE '^[[:space:]]*(#|$)' .github/pii-allowlist.txt \
            | tr '[:upper:]' '[:lower:]' \
            | sort -u)

          bad=$(comm -23 <(printf '%s\n' "$found") <(printf '%s\n' "$allowed") || true)

          if [ -n "${bad//[[:space:]]/}" ]; then
            echo "::error::Disallowed email addresses found in source:"
            printf '%s\n' "$bad" | sed 's/^/  /'
            echo "If intentional, add to .github/pii-allowlist.txt with a justifying comment."
            exit 1
          fi
          echo "OK: all emails are on the allowlist."

      - name: IP-handling code path ban (rss-worker)
        shell: bash
        run: |
          set -euo pipefail
          # The Go RSS worker must not handle inbound user requests. The
          # canonical Go ways to read a client IP are RemoteAddr and the
          # X-Forwarded-For / X-Real-IP / CF-Connecting-IP headers. If any of
          # these appear in production code, the no-PII invariant is broken
          # and this document set must be revisited.
          if rg -t go \
              -g '!*_test.go' \
              -e '\bRemoteAddr\b' \
              -e 'X-Forwarded-For' \
              -e 'X-Real-IP' \
              -e 'CF-Connecting-IP' \
              rss-worker/; then
            echo "::error::Inbound-request / client-IP handling detected in rss-worker. GDPR posture requires no IP collection. Review docs/gdpr-conformance.md before proceeding."
            exit 1
          fi
          echo "OK: no client-IP handling code paths."

      - name: Install gitleaks
        env:
          # Matches the version pinned in .github/workflows/security.yml.
          GITLEAKS_VERSION: "8.30.1"
        run: |
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Gitleaks (LGPD/GDPR custom rules)
        run: gitleaks detect --source . --verbose --redact --no-banner --config .github/lgpd-gdpr-rules.toml

  # ---------------------------------------------------------------------------
  # Docs presence: every privacy / GDPR doc must exist and be non-empty.
  # ---------------------------------------------------------------------------
  docs-presence:
    name: Docs Presence
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Required docs exist and are non-empty
        shell: bash
        run: |
          set -euo pipefail
          required=(
            docs/privacy.md
            docs/gdpr-conformance.md
            docs/ropa.md
            docs/data-retention.md
          )
          fail=0
          for f in "${required[@]}"; do
            if [ ! -s "$f" ]; then
              echo "::error file=$f::Missing or empty — required by GDPR conformance workflow."
              fail=1
            fi
          done
          [ "$fail" -eq 0 ] || exit 1
          echo "OK: all required GDPR docs present."

  # ---------------------------------------------------------------------------
  # Operational controls: cleanup workflow + retention literal + no plaintext
  # HTTP in migrations + RLS-still-enabled + the no-PII-redaction invariant
  # is still asserted in docs/gdpr-conformance.md.
  # ---------------------------------------------------------------------------
  operational-controls:
    name: Operational Controls
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: cleanup.yml exists and invokes 'rss-worker cleanup'
        shell: bash
        run: |
          set -euo pipefail
          test -f .github/workflows/cleanup.yml \
            || { echo "::error::Missing .github/workflows/cleanup.yml — retention enforcement gone."; exit 1; }
          grep -q '\./rss-worker cleanup' .github/workflows/cleanup.yml \
            || { echo "::error::cleanup.yml no longer invokes './rss-worker cleanup'."; exit 1; }
          echo "OK: cleanup workflow present and correctly wired."

      - name: ArticleRetentionDays = 7 in config
        shell: bash
        run: |
          set -euo pipefail
          if ! grep -qE 'ArticleRetentionDays:[[:space:]]+7,' rss-worker/internal/config/config.go; then
            echo "::error::ArticleRetentionDays != 7 in rss-worker/internal/config/config.go; update docs/data-retention.md to match before changing this value."
            exit 1
          fi
          echo "OK: ArticleRetentionDays = 7."

      - name: No plaintext http:// in migrations
        shell: bash
        run: |
          set -euo pipefail
          if rg --pcre2 \
              -g 'supabase/migrations/*.sql' \
              'http://(?!localhost|127\.0\.0\.1|[a-z0-9.-]*\.example\.(com|org)|www\.w3\.org|schemas\.|xmlns\.)' \
              .; then
            echo "::error::Plaintext http:// URL in supabase/migrations/. Use https or extend the technical allowlist if this is an XML namespace."
            exit 1
          fi
          echo "OK: migrations use https (or technical exceptions only)."

      - name: No-PII-redaction invariant still asserted in GDPR doc
        shell: bash
        run: |
          set -euo pipefail
          if ! grep -q 'No PII redaction layer required' docs/gdpr-conformance.md; then
            echo "::error::docs/gdpr-conformance.md no longer asserts 'No PII redaction layer required'. If a redaction layer was introduced, update both the doc and this workflow."
            exit 1
          fi
          echo "OK: no-PII invariant still asserted."

      - name: RLS not disabled on user-facing tables
        shell: bash
        run: |
          set -euo pipefail
          if rg -t sql --pcre2 \
              'ALTER TABLE\s+(articles|sources|categories|fetch_logs)\s+DISABLE ROW LEVEL SECURITY' \
              supabase/migrations/; then
            echo "::error::A migration disables RLS on a user-facing table. RLS is a load-bearing control."
            exit 1
          fi
          echo "OK: RLS remains enabled everywhere it matters."

  # ---------------------------------------------------------------------------
  # Structural integrity: catches the realistic failure mode where a future
  # PR introduces PII processing without updating the conformance docs.
  # ---------------------------------------------------------------------------
  structural-integrity:
    name: Structural Integrity
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: No new tables outside the conformance allowlist
        shell: bash
        run: |
          set -euo pipefail
          # Exact set of tables declared in migrations as of the initial
          # conformance review (2026-05-14). Any new table must be reviewed
          # under GDPR before this list is extended.
          allowed=" categories sources articles fetch_logs "

          # Optional `schema.` prefix is consumed and discarded so a future
          # `CREATE TABLE public.user_profiles` extracts `user_profiles`,
          # not `public` (which would either spuriously fail or — if the
          # schema name collides with an allowlisted table — silently slip
          # the real table past the check).
          tables=$(rg --pcre2 -oNI '^[[:space:]]*CREATE TABLE[[:space:]]+(?:IF NOT EXISTS[[:space:]]+)?(?:[A-Za-z0-9_]+\.)?([A-Za-z0-9_]+)' \
            -r '$1' \
            supabase/migrations/ 2>/dev/null | sort -u || true)

          fail=0
          for t in $tables; do
            case "$allowed" in
              *" $t "*) : ;;
              *)
                echo "::error::Migration declares a new table '$t' outside the conformance allowlist. Update docs/gdpr-conformance.md, docs/ropa.md, and the allowlist in this workflow before re-running."
                fail=1
                ;;
            esac
          done
          [ "$fail" -eq 0 ] || exit 1
          echo "OK: only allowlisted tables exist."

      - name: No suspicious PII column names in migrations
        shell: bash
        run: |
          set -euo pipefail
          # Two patterns, both catching PII-implying column declarations:
          #   1. Block-style:   inside CREATE TABLE, columns start the line.
          #   2. ALTER TABLE:   `ADD COLUMN <name> <TYPE>` is mid-statement.
          # Anchored to a type-like token following the column name so we
          # don't catch column references in WHERE clauses or function args.
          if rg --pcre2 \
              -g 'supabase/migrations/*.sql' \
              -i \
              -e '^\s*(email|phone|password|password_hash|user_id|client_ip|session_id|cpf|cnpj|rg_number|ssn|iban)\s+[A-Z]' \
              -e 'ADD COLUMN\s+(email|phone|password|password_hash|user_id|client_ip|session_id|cpf|cnpj|rg_number|ssn|iban)\s+[A-Z]' \
              .; then
            echo "::error::A migration introduces a column name that implies PII storage. Review docs/gdpr-conformance.md before continuing."
            exit 1
          fi
          echo "OK: no PII-implying column names."

      - name: ROPA subprocessor table lists GitHub and Supabase
        shell: bash
        run: |
          set -euo pipefail
          if ! grep -qE '^\|[[:space:]]*GitHub[[:space:]]' docs/ropa.md; then
            echo "::error::docs/ropa.md no longer lists GitHub as a subprocessor."
            exit 1
          fi
          if ! grep -qE '^\|[[:space:]]*Supabase[[:space:]]' docs/ropa.md; then
            echo "::error::docs/ropa.md no longer lists Supabase as a subprocessor."
            exit 1
          fi
          echo "OK: ROPA lists both subprocessors."

      - name: Retention doc declares '7 days'
        shell: bash
        run: |
          set -euo pipefail
          if ! grep -qE '\b7 days?\b' docs/data-retention.md; then
            echo "::error::docs/data-retention.md no longer states '7 days'. Update to match ArticleRetentionDays in config.go."
            exit 1
          fi
          echo "OK: retention doc matches config."
