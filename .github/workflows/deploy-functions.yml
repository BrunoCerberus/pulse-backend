name: Deploy Edge Functions

on:
  push:
    branches: [master]
    paths:
      - 'supabase/functions/**'

  # Allow manual trigger
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy Edge Functions
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Gate every prod deploy on the `production` GitHub Environment. Configure
    # in repo Settings → Environments → production: required reviewers + branch
    # restriction (master only). Without an approval, the deploy job is paused
    # in the Actions UI until a maintainer clicks "Approve and deploy".
    # The Environment also scopes the Supabase secrets so they aren't exposed
    # to other workflows.
    environment: production

    # Required secrets (must live on the `production` Environment, not at repo
    # scope, so they are gated behind the required-reviewer rule):
    #   SUPABASE_ACCESS_TOKEN  - Personal access token from https://supabase.com/dashboard/account/tokens
    #   SUPABASE_PROJECT_REF   - Project reference ID from Supabase project settings

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@3c2f5e2ae34c34e428e8e206e2c4d21fa2d20fbf # v2.1.1

      - name: Deploy Edge Functions
        run: supabase functions deploy --project-ref "$SUPABASE_PROJECT_REF"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}

      # No project ref in the output — it lives in a secret. if:success() so a
      # failed deploy doesn't claim success.
      - name: Annotate deploy result
        if: success()
        shell: bash
        run: |
          echo "::notice title=Deploy Edge Functions::Edge Functions deployed to the production project"
          {
            echo "## Deploy Edge Functions ✅"
            echo ""
            echo "- \`supabase functions deploy\` completed for the production project"
          } >> "$GITHUB_STEP_SUMMARY"
