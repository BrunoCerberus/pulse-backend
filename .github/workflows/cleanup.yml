name: Daily Cleanup

on:
  # Run daily at 3 AM UTC
  schedule:
    - cron: '0 3 * * *'

  # Allow manual trigger
  workflow_dispatch:

permissions:
  contents: read

jobs:
  cleanup:
    name: Cleanup Old Articles
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.25'
          cache: true
          cache-dependency-path: rss-worker/go.sum

      - name: Build worker
        working-directory: rss-worker
        run: |
          # go.sum is the source of truth — no `go mod tidy` in cron jobs.
          go build -o rss-worker .

      - name: Run Cleanup
        working-directory: rss-worker
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: ./rss-worker cleanup
