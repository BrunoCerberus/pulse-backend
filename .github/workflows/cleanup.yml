name: Daily Cleanup

on:
  # Run daily at 3 AM UTC
  schedule:
    - cron: '0 3 * * *'

  # Allow manual trigger
  workflow_dispatch:

permissions:
  contents: read

# Serialize cleanup runs (scheduled + manual) so two batch-delete loops can't
# race on the same rows. cancel-in-progress: false lets an in-flight run finish.
concurrency:
  group: cleanup
  cancel-in-progress: false

jobs:
  cleanup:
    name: Cleanup Old Articles
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: ./.github/actions/setup-go-worker

      - name: Build worker
        working-directory: rss-worker
        run: |
          # go.sum is the source of truth — no `go mod tidy` in cron jobs.
          go build -o rss-worker .

      - name: Run Cleanup
        id: run
        working-directory: rss-worker
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          # pipefail so a non-zero worker exit isn't swallowed by tee. Worker
          # logs to stderr; 2>&1 captures its summary lines for the next step.
          set -o pipefail
          ./rss-worker cleanup 2>&1 | tee /tmp/worker.log

      # always() so even a failed cleanup annotates the run, but branch on the
      # Run step's outcome so a red run never shows a green ✅. Collects every
      # cleanup/prune line the worker emits (some are conditional on rows).
      - name: Annotate run summary
        if: always()
        shell: bash
        env:
          RUN_OUTCOME: ${{ steps.run.outcome }}
        run: |
          log=/tmp/worker.log
          lines=()
          if [ -f "$log" ]; then
            while IFS= read -r l; do lines+=("$l"); done < <(grep -oE \
              'Cleanup complete: deleted [0-9]+ old articles|Cleaned up [0-9]+ old fetch logs|Pruned image URLs on [0-9]+ stale articles \(>[0-9]+d\)|Pruned content on [0-9]+ stale articles \(>[0-9]+d\)' \
              "$log" || true)
          fi

          if [ "$RUN_OUTCOME" = "success" ]; then
            echo "::notice title=Daily Cleanup::${lines[0]:-cleanup completed}"
            {
              echo "## Daily Cleanup ✅"
              echo ""
              if [ "${#lines[@]}" -gt 0 ]; then
                for l in "${lines[@]}"; do echo "- ${l}"; done
              else
                echo "- cleanup completed (no summary lines captured)"
              fi
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "::error title=Daily Cleanup::run ${RUN_OUTCOME} — see logs"
            {
              echo "## Daily Cleanup ❌"
              echo ""
              echo "- Run outcome: **${RUN_OUTCOME}**"
              for l in "${lines[@]}"; do echo "- ${l}"; done
            } >> "$GITHUB_STEP_SUMMARY"
          fi
