name: Scorecard

# OpenSSF Scorecard — automated supply-chain security posture scoring for this
# public repo (branch protection, pinned dependencies, token permissions, SAST,
# dangerous workflow patterns, etc.). Uploads SARIF to the Security tab and
# publishes the score to the public OpenSSF API so a README badge / deps.dev
# can surface it. Informational — intentionally NOT a required status check.

on:
  # Re-score when branch protection changes (one of the checks Scorecard grades).
  branch_protection_rule:
  schedule:
    - cron: '30 5 * * 1' # Mondays 05:30 UTC
  push:
    branches: [master]
  workflow_dispatch:

# Default to read-only; the analysis job widens it for SARIF upload + publish.
permissions: read-all

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      security-events: write # upload the SARIF result to the Security tab
      id-token: write # publish results to the public OpenSSF Scorecard API
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run Scorecard analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          # Publish to the public API (badge / deps.dev). Safe for a public repo.
          publish_results: true

      - name: Upload SARIF artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: scorecard-results
          path: results.sarif
          retention-days: 5

      - name: Upload SARIF to code scanning
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          sarif_file: results.sarif
          category: scorecard
