name: Migrations CI

# Applies every Supabase migration from scratch in the Supabase local stack and
# asserts security invariants against the resulting schema. The migrations
# reference Supabase-managed roles (anon, authenticated, service_role,
# authenticator) and the `request.jwt.claims` request GUC, so they can only be
# applied via the local stack — a bare Postgres lacks those roles.
#
# This workflow runs on EVERY PR/push to master (no path filter) so its
# "Apply migrations + invariants" context always reports and can be a required
# status check without deadlocking unrelated PRs. The expensive Supabase-stack
# validation is gated internally: it runs only when migrations / config / tests
# (or this workflow) changed, and is skipped-but-green otherwise.

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

# Cancel superseded PR runs; let push/dispatch runs on master finish.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  validate:
    name: Apply migrations + invariants
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      # Detect whether anything that affects the schema changed. Skipped on
      # workflow_dispatch (which always force-runs the full validation below).
      - name: Detect schema-related changes
        id: changes
        if: github.event_name != 'workflow_dispatch'
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        with:
          filters: |
            schema:
              - 'supabase/migrations/**'
              - 'supabase/config.toml'
              - 'supabase/tests/**'
              - '.github/workflows/migrations-ci.yml'

      - name: Decide whether to run full validation
        id: decide
        shell: bash
        env:
          CHANGED: ${{ steps.changes.outputs.schema }}
          EVENT: ${{ github.event_name }}
        run: |
          set -euo pipefail
          if [ "$CHANGED" = "true" ] || [ "$EVENT" = "workflow_dispatch" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Supabase CLI
        if: steps.decide.outputs.run == 'true'
        uses: supabase/setup-cli@46f7f98c7f948ad727d22c1e67fab04c223a0520 # v3.0.0

      - name: Start local Postgres
        if: steps.decide.outputs.run == 'true'
        shell: bash
        run: |
          set -euo pipefail
          # Docker is preinstalled on ubuntu-latest; this boots the Supabase
          # local Postgres (and supporting containers) in Docker.
          supabase db start

      - name: Apply migrations from scratch
        if: steps.decide.outputs.run == 'true'
        shell: bash
        run: |
          set -euo pipefail
          # CORE CHECK: drops and re-applies every migration from scratch.
          # Exits non-zero on ANY SQL error, so a broken or out-of-order
          # migration fails the build here.
          supabase db reset --no-seed

      - name: Lint plpgsql
        if: steps.decide.outputs.run == 'true'
        shell: bash
        run: |
          set -euo pipefail
          # plpgsql type/lint pass over the applied schema. Fails the step on
          # any error-level finding (warnings are reported but non-fatal).
          supabase db lint --level warning --fail-on error

      - name: Run security invariants
        id: invariants
        if: steps.decide.outputs.run == 'true'
        shell: bash
        run: |
          set -euo pipefail
          # pipefail so a failed psql assertion isn't masked by tee's success.
          # ON_ERROR_STOP=1 makes any RAISE EXCEPTION in the script abort psql
          # with a non-zero exit.
          psql "postgresql://postgres:postgres@127.0.0.1:54322/postgres" \
            -v ON_ERROR_STOP=1 \
            -f supabase/tests/security_invariants.sql 2>&1 | tee /tmp/invariants.log

      # Surface the outcome in the Annotations box + Job Summary. always() so a
      # failed run still annotates, but branch on the invariants step's outcome
      # (psql can print partial output before aborting) so a red run never shows
      # a green check. Matches the always()+outcome pattern in
      # fetch-rss.yml / test.yml.
      - name: Annotate migrations CI result
        if: always()
        shell: bash
        env:
          RUN_VALIDATION: ${{ steps.decide.outputs.run }}
          INVARIANTS_OUTCOME: ${{ steps.invariants.outcome }}
        run: |
          set -euo pipefail
          if [ "$RUN_VALIDATION" != "true" ]; then
            echo "::notice title=Migrations CI::no schema/config/test changes — full validation skipped"
            {
              echo "## Migrations CI ⏭️"
              echo ""
              echo "- No changes under \`supabase/migrations\`, \`supabase/config.toml\`, or \`supabase/tests\` — the apply-from-scratch + lint + invariants suite was skipped (nothing to verify)."
            } >> "$GITHUB_STEP_SUMMARY"
          elif [ "$INVARIANTS_OUTCOME" = "success" ]; then
            # Count migrations from the tree rather than hardcoding a number
            # that rots every time a migration lands.
            migration_count=$(find supabase/migrations -name '*.sql' | wc -l | tr -d ' ')
            echo "::notice title=Migrations CI::${migration_count} migrations applied from scratch · db lint clean · security invariants passed"
            {
              echo "## Migrations CI ✅"
              echo ""
              echo "- Apply-from-scratch: all ${migration_count} migrations (\`supabase db reset --no-seed\`) applied with no SQL error"
              echo "- plpgsql lint: no error-level findings (\`supabase db lint --fail-on error\`)"
              echo "- Security invariants (supabase/tests/security_invariants.sql): RLS on articles + fetch_logs + sources + categories · SECURITY DEFINER funcs pin empty search_path · write functions are SECURITY DEFINER · write funcs carry the JWT-claim gate + anon/authenticated EXECUTE revoked · search_articles length cap + bounded projection · articles_with_source hides url_hash · base-table articles column grant hides url_hash/backfill · sources/categories writes revoked · sources operational columns revoked · security_invoker on views"
            } >> "$GITHUB_STEP_SUMMARY"
          else
            tail=""
            [ -f /tmp/invariants.log ] && tail=$(grep -E 'INVARIANT|caller-gate|ERROR|FAILED' /tmp/invariants.log | tail -1 || true)
            echo "::error title=Migrations CI::invariants outcome ${INVARIANTS_OUTCOME}${tail:+ — ${tail}}"
            {
              echo "## Migrations CI ❌"
              echo ""
              echo "- Invariants step outcome: **${INVARIANTS_OUTCOME}**"
              echo "- Last failure line: ${tail:-none captured (failure may be in an earlier step — see logs)}"
            } >> "$GITHUB_STEP_SUMMARY"
          fi
