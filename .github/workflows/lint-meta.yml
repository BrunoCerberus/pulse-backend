name: Meta Lint

# Lints the repo's own GitHub Actions workflows (and the shell embedded in
# their `run:` blocks) so CI definitions can't silently rot. No path filter —
# workflow/shell mistakes can hide anywhere a `run:` block lives, and the job
# is fast — so it runs on every push/PR against master.

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ---------------------------------------------------------------------------
  # actionlint
  # Static analysis for GitHub Actions workflows: catches invalid syntax, bad
  # `uses:` refs, expression typos, and shell bugs. actionlint auto-invokes
  # shellcheck on every `run:` block, so embedded shell is linted too.
  # ---------------------------------------------------------------------------
  actionlint:
    name: Lint workflows + shell
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Install actionlint
        env:
          # Bump both together (see https://github.com/rhysd/actionlint/releases;
          # sha256 from the release's actionlint_<ver>_checksums.txt).
          ACTIONLINT_VERSION: "1.7.7"
          ACTIONLINT_SHA256: "023070a287cd8cccd71515fedc843f1985bf96c436b7effaecce67290e7e0757"
        run: |
          set -euo pipefail
          # Verify against the checksum pinned above before extracting: release
          # assets are mutable, so a version pin alone doesn't stop a compromised
          # upstream from swapping the tarball behind the same tag.
          curl -sSL -o /tmp/actionlint.tar.gz \
            "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          echo "${ACTIONLINT_SHA256}  /tmp/actionlint.tar.gz" | sha256sum -c -
          sudo tar -xz -C /usr/local/bin -f /tmp/actionlint.tar.gz actionlint
          actionlint --version

      - name: Run actionlint
        # shellcheck is pre-installed on ubuntu-latest runners; actionlint
        # auto-invokes it on every `run:` block, so no separate install needed.
        run: |
          set -euo pipefail
          actionlint -color

      - name: Annotate meta lint result
        if: success()
        shell: bash
        env:
          ACTIONLINT_VERSION: "1.7.7"
        run: |
          set -euo pipefail
          echo "::notice title=Meta Lint::actionlint + shellcheck passed — no findings across all workflows"
          {
            echo "## Meta Lint ✅"
            echo ""
            echo "- actionlint v${ACTIONLINT_VERSION}: no findings across all workflows"
            echo "- shellcheck: ran on embedded \`run:\` blocks — no findings"
          } >> "$GITHUB_STEP_SUMMARY"
