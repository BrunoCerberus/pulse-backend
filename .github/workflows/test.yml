name: Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  go-tests:
    name: Go Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25"
          cache: true
          cache-dependency-path: rss-worker/go.sum

      - name: Run tests with race detector
        working-directory: ./rss-worker
        run: go test -v -race ./...

      - name: Run tests with coverage
        working-directory: ./rss-worker
        run: go test -coverprofile=coverage.out ./...

      - name: Display coverage summary
        working-directory: ./rss-worker
        run: go tool cover -func=coverage.out

      - name: Enforce 100% coverage
        working-directory: ./rss-worker
        run: |
          total=$(go tool cover -func=coverage.out | awk '/^total:/ {print $NF}')
          if [ "$total" != "100.0%" ]; then
            echo "::error::Total coverage $total is below the 100.0% threshold"
            echo ""
            echo "Functions below 100%:"
            go tool cover -func=coverage.out | awk '$NF != "100.0%" && !/^total:/'
            exit 1
          fi
          # Populate the Annotations box + Job Summary on the green path. The
          # race-detector step ran (and passed) earlier in this job.
          echo "::notice title=Go Tests::race detector passed · total coverage ${total}"
          {
            echo "## Go Tests ✅"
            echo ""
            echo "- Race detector: passed"
            echo "- Total coverage: **${total}**"
            echo ""
            echo "<details><summary>Per-function coverage</summary>"
            echo ""
            echo '```'
            go tool cover -func=coverage.out
            echo '```'
            echo ""
            echo "</details>"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Run govulncheck
        uses: golang/govulncheck-action@b625fbe08f3bccbe446d94fbf87fcc875a4f50ee # v1.0.4
        with:
          work-dir: ./rss-worker
          repo-checkout: false

  lint:
    name: Go Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25"
          cache: true
          cache-dependency-path: rss-worker/go.sum

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          # Pinned so a compromise of the golangci-lint release pipeline
          # can't land a malicious binary on the next run. Bump via
          # Dependabot (config in .github/dependabot.yml).
          version: v2.4.0
          working-directory: ./rss-worker

      # golangci-lint annotates its own findings on failure; this records the
      # clean pass. if:success() means it's skipped (not run) when lint fails.
      - name: Annotate lint result
        if: success()
        shell: bash
        run: |
          echo "::notice title=Go Lint::golangci-lint v2.4.0 passed — no findings"
          {
            echo "## Go Lint ✅"
            echo ""
            echo "- golangci-lint **v2.4.0**: no findings"
          } >> "$GITHUB_STEP_SUMMARY"

  deno-tests:
    name: Deno Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Deno
        uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2.0.4
        with:
          # Pin to a concrete release so a compromise of Deno's release
          # channel can't push a malicious binary into CI on the next run.
          # Must be a 2.x release because deno.lock is on lockfile version 5
          # (Deno 1.x only handles v3/4).
          deno-version: v2.7.14

      - name: Run Edge Function tests
        id: deno
        working-directory: ./supabase/functions
        # `--frozen` makes the build fail if any imported URL drifts from the
        # committed `deno.lock`, blocking a hijacked deno.land/std module
        # from slipping into CI silently.
        run: |
          set -o pipefail
          deno test --frozen --allow-env --allow-net _shared/ api-articles/ api-categories/ api-sources/ api-search/ api-health/ api-source-health/ 2>&1 | tee /tmp/deno-test.log

      # deno prints a final tally ("ok | N passed | M failed (…)") on both
      # success and failure. Branch on the run step's outcome so the annotation
      # is honest about which one happened.
      - name: Annotate Deno test result
        if: always()
        shell: bash
        env:
          DENO_OUTCOME: ${{ steps.deno.outcome }}
        run: |
          log=/tmp/deno-test.log
          summary=""
          [ -f "$log" ] && summary=$(grep -oE '(ok|FAILED) \| [0-9]+ passed.*' "$log" | tail -1 || true)
          if [ "$DENO_OUTCOME" = "success" ]; then
            echo "::notice title=Deno Tests::${summary:-all tests passed}"
            {
              echo "## Deno Tests ✅"
              echo ""
              echo "- ${summary:-all tests passed}"
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "::error title=Deno Tests::${summary:-tests failed — see logs}"
            {
              echo "## Deno Tests ❌"
              echo ""
              echo "- ${summary:-tests failed — see logs}"
            } >> "$GITHUB_STEP_SUMMARY"
          fi
