name: Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  go-tests:
    name: Go Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.24"
          cache: true
          cache-dependency-path: rss-worker/go.sum

      - name: Run tests with race detector
        working-directory: ./rss-worker
        run: go test -v -race ./...

      - name: Run tests with coverage
        working-directory: ./rss-worker
        run: go test -coverprofile=coverage.out ./...

      - name: Display coverage summary
        working-directory: ./rss-worker
        run: go tool cover -func=coverage.out

      - name: Run govulncheck
        uses: golang/govulncheck-action@v1
        with:
          work-dir: ./rss-worker

  lint:
    name: Go Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.24"
          cache: true
          cache-dependency-path: rss-worker/go.sum

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          working-directory: ./rss-worker

  deno-tests:
    name: Deno Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Deno
        uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2.0.4
        with:
          deno-version: v1.x

      - name: Run Edge Function tests
        working-directory: ./supabase/functions
        run: deno test --allow-env --allow-net _shared/ api-articles/ api-categories/ api-sources/ api-search/ api-health/
