name: Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

# Cancel superseded PR runs to save CI minutes; never cancel a push-to-master
# run (those gate the required checks).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  go-tests:
    name: Go Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25"
          cache: true
          cache-dependency-path: rss-worker/go.sum

      - name: Run tests with race detector
        working-directory: ./rss-worker
        run: go test -v -race ./...

      - name: Run tests with coverage
        working-directory: ./rss-worker
        run: go test -coverprofile=coverage.out ./...

      - name: Display coverage summary
        working-directory: ./rss-worker
        run: go tool cover -func=coverage.out

      - name: Enforce 100% coverage
        working-directory: ./rss-worker
        run: |
          total=$(go tool cover -func=coverage.out | awk '/^total:/ {print $NF}')
          if [ "$total" != "100.0%" ]; then
            echo "::error::Total coverage $total is below the 100.0% threshold"
            echo ""
            echo "Functions below 100%:"
            go tool cover -func=coverage.out | awk '$NF != "100.0%" && !/^total:/'
            exit 1
          fi
          # Populate the Annotations box + Job Summary on the green path. The
          # race-detector step ran (and passed) earlier in this job.
          echo "::notice title=Go Tests::race detector passed · total coverage ${total}"
          {
            echo "## Go Tests ✅"
            echo ""
            echo "- Race detector: passed"
            echo "- Total coverage: **${total}**"
            echo ""
            echo "<details><summary>Per-function coverage</summary>"
            echo ""
            echo '```'
            go tool cover -func=coverage.out
            echo '```'
            echo ""
            echo "</details>"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Run govulncheck
        uses: golang/govulncheck-action@b625fbe08f3bccbe446d94fbf87fcc875a4f50ee # v1.0.4
        with:
          work-dir: ./rss-worker
          repo-checkout: false

  lint:
    name: Go Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25"
          cache: true
          cache-dependency-path: rss-worker/go.sum

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
        with:
          # Pinned so a compromise of the golangci-lint release pipeline
          # can't land a malicious binary on the next run. Bump via
          # Dependabot (config in .github/dependabot.yml).
          version: v2.4.0
          working-directory: ./rss-worker

      # golangci-lint annotates its own findings on failure; this records the
      # clean pass. if:success() means it's skipped (not run) when lint fails.
      - name: Annotate lint result
        if: success()
        shell: bash
        run: |
          echo "::notice title=Go Lint::golangci-lint v2.4.0 passed — no findings"
          {
            echo "## Go Lint ✅"
            echo ""
            echo "- golangci-lint **v2.4.0**: no findings"
          } >> "$GITHUB_STEP_SUMMARY"

  deno-tests:
    name: Deno Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Deno
        uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2.0.4
        with:
          # Pin to a concrete release so a compromise of Deno's release
          # channel can't push a malicious binary into CI on the next run.
          # Must be a 2.x release because deno.lock is on lockfile version 5
          # (Deno 1.x only handles v3/4).
          deno-version: v2.7.14
          # Cache the dependency download (DENO_DIR), keyed on deno.lock, so
          # repeat runs don't re-fetch every imported std module.
          cache: true

      - name: Lint + format-check Edge Functions
        working-directory: ./supabase/functions
        # deno fmt --check enforces formatting; deno lint catches unused vars,
        # no-explicit-any, etc. across the Edge Functions and their tests.
        run: |
          set -euo pipefail
          deno fmt --check
          deno lint
          echo "::notice title=Deno Lint::deno fmt --check + deno lint passed — no findings"
          {
            echo "## Deno Lint + Format ✅"
            echo ""
            echo "- deno fmt --check: all files formatted"
            echo "- deno lint: no findings"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Run Edge Function tests
        id: deno
        working-directory: ./supabase/functions
        # `--frozen` makes the build fail if any imported URL drifts from the
        # committed `deno.lock`, blocking a hijacked deno.land/std module
        # from slipping into CI silently.
        run: |
          set -o pipefail
          deno test --frozen --allow-env --allow-net --coverage=cov_profile _shared/ api-articles/ api-categories/ api-sources/ api-search/ api-health/ api-source-health/ 2>&1 | tee /tmp/deno-test.log

      # Enforce a line-coverage floor on the Edge Functions (currently ~96.8%).
      # Mirrors the Go side's coverage gate so the TS layer can't silently
      # regress. Floor is set below today's number to leave normal headroom.
      - name: Check Edge Function coverage
        if: success()
        working-directory: ./supabase/functions
        shell: bash
        env:
          DENO_COVERAGE_FLOOR: "90.0"
        run: |
          set -euo pipefail
          report=$(deno coverage cov_profile | sed -E 's/\x1b\[[0-9;]*m//g')
          echo "$report"
          line=$(printf '%s\n' "$report" | awk -F'|' '/All files/ { v=$(NF-1); gsub(/[^0-9.]/,"",v); print v }')
          : "${line:=0}"
          echo "Total Edge Function line coverage: ${line}% (floor ${DENO_COVERAGE_FLOOR}%)"
          if ! awk -v c="$line" -v f="$DENO_COVERAGE_FLOOR" 'BEGIN { exit !(c+0 >= f+0) }'; then
            echo "::error title=Deno Tests::Edge Function line coverage ${line}% is below the ${DENO_COVERAGE_FLOOR}% floor"
            exit 1
          fi
          {
            echo "## Deno Coverage ✅"
            echo ""
            echo "- Total line coverage: **${line}%** (floor ${DENO_COVERAGE_FLOOR}%)"
          } >> "$GITHUB_STEP_SUMMARY"

      # deno prints a final tally ("ok | N passed | M failed (…)") on both
      # success and failure. Branch on the run step's outcome so the annotation
      # is honest about which one happened.
      - name: Annotate Deno test result
        if: always()
        shell: bash
        env:
          DENO_OUTCOME: ${{ steps.deno.outcome }}
        run: |
          log=/tmp/deno-test.log
          summary=""
          [ -f "$log" ] && summary=$(grep -oE '(ok|FAILED) \| [0-9]+ passed.*' "$log" | tail -1 || true)
          if [ "$DENO_OUTCOME" = "success" ]; then
            echo "::notice title=Deno Tests::${summary:-all tests passed}"
            {
              echo "## Deno Tests ✅"
              echo ""
              echo "- ${summary:-all tests passed}"
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "::error title=Deno Tests::${summary:-tests failed — see logs}"
            {
              echo "## Deno Tests ❌"
              echo ""
              echo "- ${summary:-tests failed — see logs}"
            } >> "$GITHUB_STEP_SUMMARY"
          fi
